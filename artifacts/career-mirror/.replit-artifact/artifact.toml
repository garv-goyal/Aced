kind = "web"
previewPath = "/"
title = "Career Mirror"
version = "1.0.0"
id = "artifacts/career-mirror"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22545

[services.development]
run = "pnpm --filter @workspace/career-mirror run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career-mirror", "run", "build" ]
publicDir = "artifacts/career-mirror/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22545"
BASE_PATH = "/"
